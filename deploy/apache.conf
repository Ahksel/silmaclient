# Generic production example. Replace the domain and paths as needed.
<VirtualHost *:443>
    ServerName mud.example.com

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Require all granted
        Options -Indexes
        DirectoryIndex index.html index.htm index.php
    </Directory>

    Alias /silmaclient-client/ /opt/webapps/silmaril/silmaclient-client/

    <Directory /opt/webapps/silmaril/silmaclient-client>
        Require all granted
        Options -Indexes
        DirectoryIndex index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass        /silmaclient/ws  ws://127.0.0.1:8088/ws
    ProxyPassReverse /silmaclient/ws  ws://127.0.0.1:8088/ws
    ProxyPass        /silmaclient/config  http://127.0.0.1:8088/config
    ProxyPassReverse /silmaclient/config  http://127.0.0.1:8088/config

    # The Rust service must listen only on 127.0.0.1:8088. No firewall rule
    # or public listener is needed for that port.

    # Keep the site's existing TLS certificate and logging directives here.
</VirtualHost>
